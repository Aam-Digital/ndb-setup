services:
  app:
    image: aamdigital/ndb-server:${APP_VERSION:-latest}
    container_name: ${INSTANCE_NAME}-app
    networks:
      - internal_aam
      - external_web
    volumes:
      - ./config.json:/usr/share/nginx/html/assets/config.json
      - ./keycloak.json:/usr/share/nginx/html/assets/keycloak.json
      - ./firebase-config.json:/usr/share/nginx/html/assets/firebase-config.json
    environment:
      # nginx-proxy auto-configuration (see nginx-proxy/). Ignored by the swag-proxy
      # and when no proxy is used, so this stays compatible with either proxy choice.
      # Serves the frontend at "/"; /db and /api are routed to the other services below.
      VIRTUAL_HOST: ${INSTANCE_NAME}.${INSTANCE_DOMAIN}
      VIRTUAL_PORT: 8080
      VIRTUAL_PATH: /
      # Request a Let's Encrypt certificate for this host (acme-companion).
      # Set only here: the certificate is per-host, shared across all paths.
      LETSENCRYPT_HOST: ${INSTANCE_NAME}.${INSTANCE_DOMAIN}
    restart: unless-stopped

  couchdb-only:
    image: couchdb:3
    container_name: ${INSTANCE_NAME}-db-entrypoint
    user: "1000:1000"
    networks:
      - internal_aam
      - external_web
    volumes:
      - ./couchdb/data:/opt/couchdb/data
      - ./couchdb.ini:/opt/couchdb/etc/local.d/couchdb.ini
    environment:
      COUCHDB_USER: ${COUCHDB_USER:?COUCHDB_USER is not set}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:?COUCHDB_PASSWORD is not set}
      # nginx-proxy: expose CouchDB under /db (trailing-slash VIRTUAL_DEST strips the
      # /db prefix). Inert under swag-proxy / no proxy. See the "app" service above.
      VIRTUAL_HOST: ${INSTANCE_NAME}.${INSTANCE_DOMAIN}
      VIRTUAL_PORT: 5984
      VIRTUAL_PATH: /db/
      VIRTUAL_DEST: /
    restart: unless-stopped
    profiles:
      - database-only

  couchdb-with-permissions:
    image: couchdb:3
    container_name: ${INSTANCE_NAME}-database
    user: "1000:1000"
    networks:
      - internal_aam
    volumes:
      - ./couchdb/data:/opt/couchdb/data
      - ./couchdb.ini:/opt/couchdb/etc/local.d/couchdb.ini
    environment:
      COUCHDB_USER: ${COUCHDB_USER:?COUCHDB_USER is not set}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:?COUCHDB_PASSWORD is not set}
    healthcheck:
      # /_up is CouchDB's unauthenticated readiness endpoint; curl ships in the couchdb:3 image
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    profiles:
      - with-permissions
      - full-stack
      - full-stack-without-sqs

  # (optional) replication-backend. Only deployed if "COMPOSE_PROFILES" is "with-permissions", "full-stack", or "full-stack-without-sqs" is set in the `.env` file
  replication-backend:
    image: ghcr.io/aam-digital/replication-backend:${AAM_REPLICATION_BACKEND_VERSION:-latest}
    container_name: ${INSTANCE_NAME}-db-entrypoint
    networks:
      - internal_aam
      - external_web
    depends_on:
      couchdb-with-permissions:
        condition: service_healthy
    environment:
      DATABASE_URL: http://${INSTANCE_NAME:?INSTANCE_NAME is not set}-database:5984
      DATABASE_NAME: app
      DATABASE_USER: ${COUCHDB_USER}
      DATABASE_PASSWORD: ${COUCHDB_PASSWORD}
      JWT_SECRET: ${REPLICATION_BACKEND_JWT_SECRET:?REPLICATION_BACKEND_JWT_SECRET is not set}
      JWT_PUBLIC_KEY: "-----BEGIN PUBLIC KEY-----\n${REPLICATION_BACKEND_PUBLIC_KEY:?REPLICATION_BACKEND_PUBLIC_KEY is not set}\n-----END PUBLIC KEY-----"
      SENTRY_DSN: ${SENTRY_DSN_REPLICATION_BACKEND}
      SENTRY_ENABLED: ${SENTRY_ENABLED}
      SENTRY_INSTANCE_NAME: ${INSTANCE_NAME}.${INSTANCE_DOMAIN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT}
      KEYCLOAK_ADMIN_BASE_URL: https://${KEYCLOAK_URL}
      KEYCLOAK_REALM: ${INSTANCE_NAME}
      KEYCLOAK_ADMIN_CLIENT_ID: ${REPLICATION_BACKEND_KEYCLOAK_CLIENT_ID:-aam-backend}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${REPLICATION_BACKEND_KEYCLOAK_CLIENT_SECRET}
      AUDIT_ENABLED: ${REPLICATION_BACKEND_AUDIT_ENABLED:-true}
      PORT: 5984
      # nginx-proxy: same /db routing as couchdb-only, but this container (the
      # db-entrypoint in with-permissions/full-stack) enforces permission checks.
      # Inert under swag-proxy / no proxy.
      VIRTUAL_HOST: ${INSTANCE_NAME}.${INSTANCE_DOMAIN}
      VIRTUAL_PORT: 5984
      VIRTUAL_PATH: /db/
      VIRTUAL_DEST: /
    restart: unless-stopped
    profiles:
      - with-permissions
      - full-stack
      - full-stack-without-sqs

  # (optional) aam-backend-service. Only deployed if "COMPOSE_PROFILES" is "full-stack" or "full-stack-without-sqs" is set in the `.env` file
  aam-backend-service:
    image: ghcr.io/aam-digital/aam-backend-service:${AAM_BACKEND_SERVICE_VERSION:-latest}
    container_name: ${INSTANCE_NAME}-aam-backend-service
    networks:
      - internal_aam
      - external_web
    depends_on:
      # wait until CouchDB and RabbitMQ actually accept connections, not just that the containers started -
      # otherwise the listener containers race broker readiness on boot and flood Sentry with
      # "Failed to check/redeclare auto-delete queue(s)." errors
      couchdb-with-permissions:
        condition: service_healthy
      replication-backend:
        condition: service_started
      aam-backend-service-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./storage/aam-backend-service/data:/aam-backend-service/bin/data
      - ./config/aam-backend-service/templates:/opt/app/templates:ro
    environment:
      # Override values from application.env that need per-instance interpolation.
      # Using container_name avoids alias collisions on the shared external_web network.
      COUCHDBCLIENTCONFIGURATION_BASEPATH: http://${INSTANCE_NAME:?INSTANCE_NAME is not set}-database:5984
      AAMREPLICATIONBACKENDCLIENTCONFIGURATION_BASEPATH: http://${INSTANCE_NAME:?INSTANCE_NAME is not set}-db-entrypoint:5984
      APPLICATION_BASEURL: ${INSTANCE_NAME:?INSTANCE_NAME is not set}.${INSTANCE_DOMAIN:?INSTANCE_DOMAIN is not set}
      # nginx-proxy: expose the backend API under /api (no VIRTUAL_DEST, so the /api
      # prefix is preserved when proxied). Inert under swag-proxy / no proxy.
      # Note: swag also routes the legacy /query alias here; nginx-proxy does not
      # (a single container cannot declare two rewrite paths via these env vars).
      VIRTUAL_HOST: ${INSTANCE_NAME}.${INSTANCE_DOMAIN}
      VIRTUAL_PORT: 8080
      VIRTUAL_PATH: /api/
    env_file:
      - ./config/aam-backend-service/application.env
    restart: unless-stopped
    profiles:
      - full-stack
      - full-stack-without-sqs

  aam-backend-service-db:
    image: postgres:16.5-bookworm
    container_name: ${INSTANCE_NAME}-aam-backend-service-db
    networks:
      - internal_aam
    volumes:
      - ./storage/aam-backend-service/postgresql-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: aam-backend-service
      POSTGRES_USER:  ${COUCHDB_USER}
      POSTGRES_PASSWORD: ${COUCHDB_PASSWORD}
    restart: unless-stopped
    profiles:
      - full-stack
      - full-stack-without-sqs

  # (optional) needed for aam-backend-service. Only deployed if "COMPOSE_PROFILES" is "full-stack" or "full-stack-without-sqs" is set in the `.env` file
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ${INSTANCE_NAME}-rabbitmq
    networks:
      - internal_aam
    healthcheck:
      # verifies the AMQP listener is actually accepting connections, not just that the process started
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ./storage/rabbitmq/data:/var/lib/rabbitmq/
      - ./storage/rabbitmq/log:/var/log/rabbitmq
    profiles:
      - full-stack
      - full-stack-without-sqs

  # (optional) needed for aam-backend-service. Only deployed if "COMPOSE_PROFILES" is "full-stack" is set in the `.env` file
  # Note: SQS is excluded from the full-stack-without-sqs profile (which skips the private SQS image)
  sqs:
    image: ghcr.io/aam-digital/sqs-aam:latest
    container_name: ${INSTANCE_NAME}-sqs
    networks:
      - internal_aam
    depends_on:
      couchdb-with-permissions:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./storage/sqs:/data
    environment:
      SQS_COUCHDB_URL: http://${INSTANCE_NAME:?INSTANCE_NAME is not set}-database:5984
    profiles:
      - full-stack

networks:
  internal_aam:
  external_web:
    external: true
